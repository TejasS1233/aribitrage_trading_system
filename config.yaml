exchanges:
  - binance
  - coinbase
  - kraken
  - kucoin
  - bybit
  - okx
  - bitfinex
  - gate

symbols:
  - BTC/USDT
  - ETH/USDT
  - ETH/BTC
  - SOL/USDT
  - SOL/BTC
  - SOL/ETH
  - XRP/USDT
  - XRP/BTC
  - XRP/ETH
  - DOGE/USDT
  - DOGE/BTC
  - ADA/USDT
  - ADA/BTC
  - AVAX/USDT
  - AVAX/BTC
  - DOT/USDT
  - DOT/BTC
  - LINK/USDT
  - LINK/BTC
  - MATIC/USDT
  - MATIC/BTC
  - UNI/USDT
  - UNI/BTC
  - LTC/USDT
  - LTC/BTC
  - ATOM/USDT
  - ATOM/BTC
  - NEAR/USDT
  - NEAR/BTC
  - ARB/USDT
  - OP/USDT

starting_balance:
  USDT: 10000

fees:
  default: 0.0001
  binance: 0.0001
  coinbase: 0.0005
  kraken: 0.0002
  kucoin: 0.0001
  bybit: 0.0001
  okx: 0.0001
  bitfinex: 0.0002
  gate: 0.0002

poll_interval: 2.0
min_profit_pct: 0.0
min_volume: 0

hurdle_rate: 0.0

database:
  path: data/trades.db

terminal:
  max_rows: 15

debug: false

auto_discover:
  enabled: false
  min_volume_24h: 100000
  update_interval: 300

websocket:
  enabled: false
  fallback_poll_interval: 5.0

stale_filter:
  max_age_seconds: 5.0

dex:
  enabled: false
  ethereum:
    rpc_url: ""
    uniswap_factory: "0x5C69bEe701ef814a2B6a3EDD4B1652CB9cc5aA6f"
    sushiswap_factory: "0xC0AEe478e3658e2610c5F7A4A2E1777cE9e4f2Ac"
  solana:
    rpc_url: "https://api.mainnet-beta.solana.com"

polymarket:
  enabled: false
  min_spread: 0.01
