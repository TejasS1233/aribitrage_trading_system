<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arb Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;510;590&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/linear.css">
</head>
<body>
  <header class="header">
    <div class="brand">
      <div class="logo"></div>
      <span class="brand-name">Arb Scanner</span>
    </div>
    <div class="status-badge">
      <span class="status-dot"></span>
      LIVE
    </div>
  </header>

  <main class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-value" id="balance">$10,000</div>
        <div class="stat-sub" id="win-rate">Win Rate: --</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Opportunities Found</div>
        <div class="stat-value" id="found">0</div>
        <div class="stat-sub">
          <span id="cross">0</span> cross / 
          <span id="triangular">0</span> triangular
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Profit Dist</div>
        <div id="pnl-chart"></div>
      </div>
    </div>

    <div class="advice-card">
      <div class="advice-header">AI Insight</div>
      <div class="advice-content" id="ai-advice">Waiting for opportunities...</div>
    </div>

    <div class="opps-section">
      <div class="opps-header">
        <span class="opps-title">Live Opportunities</span>
        <span class="opps-count" id="opps-count">0</span>
      </div>
      <div class="opps-list" id="opps-list">
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 6v6l4 2"></path>
            </svg>
          </div>
          <div class="empty-title">Scanning for opportunities</div>
          <div class="empty-desc">Checking exchanges for arbitrage...</div>
        </div>
      </div>
    </div>
  </main>

  

  <script src="/static/js/app.js"></script>
</body>
</html>
